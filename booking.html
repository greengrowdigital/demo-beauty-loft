<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Book an appointment · The Beauty Loft</title>
<meta name="description" content="Reserve your moment. Book online — secure, instant confirmation." />
<link rel="icon" type="image/png" href="assets/img/logo.png?v=2">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500;600;700&family=Italianno&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/main.css?v=12" />
<style>
.square-frame{
  position:relative;
  background:#ffffff;
  border-radius:20px;
  border:1px solid rgba(212,175,55,.35);
  box-shadow:0 40px 100px -20px rgba(212,175,55,.25), 0 20px 50px -10px rgba(0,0,0,.6);
  overflow:hidden;
  min-height:680px;
}
.square-frame::before,
.square-frame::after{
  content:""; position:absolute; width:60px; height:1px; background:#d4af37;
}
.square-frame::before{ top:18px; left:18px; box-shadow:0 0 0 0 #d4af37; }
.square-frame::after{ bottom:18px; right:18px; }
.square-frame > div{ padding:24px; }
@media(min-width:768px){ .square-frame > div{ padding:36px; } }
.square-loading{
  position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
  color:#7a7a7a; font-family:Inter, sans-serif; gap:18px; pointer-events:none;
  transition:opacity .6s ease;
}
.square-frame.loaded .square-loading{ opacity:0; }
.spin-ring{ width:46px; height:46px; border:2px solid rgba(212,175,55,.2); border-top-color:#d4af37; border-radius:50%; animation:spin 1s linear infinite; }
@keyframes spin{ to{ transform:rotate(360deg); } }
</style>
</head>
<body>

<div class="page-loader"><div class="page-loader-inner"><img src="assets/img/logo.png?v=2" alt="The Beauty Loft" class="page-loader-logo-img"><div class="page-loader-bar"></div></div></div>
<div id="scroll-progress" style="position:fixed;top:0;left:0;height:2px;background:linear-gradient(90deg,#a88a2e,#d4af37,#f4e4ba);width:0;z-index:101"></div>

<!-- Top bar -->
<div class="bg-[#0a0a0a] text-[#d4af37] py-2.5 px-6 text-center border-b border-[#d4af37]/15">
  <div class="text-xs tracking-[.32em] uppercase">
    <span data-i18n="top.bar"></span><span class="mx-4 opacity-50">·</span>
    <a href="contact.html" class="underline underline-offset-4 hover:text-[#f4e4ba]">+1 (212) 555-0100</a>
  </div>
</div>

<!-- Navbar -->
<header id="navbar" class="sticky top-0 z-50 bg-[#050505]/95 backdrop-blur-md border-b border-[#d4af37]/10">
  <div class="max-w-7xl mx-auto flex items-center justify-between px-6 py-5">
    <a href="index.html" class="flex items-center">
      <img src="assets/img/logo.png?v=2" alt="The Beauty Loft" class="brand-logo">
    </a>
    <nav class="hidden lg:flex items-center gap-8">
      <a href="index.html" class="nav-link" data-i18n="nav.home"></a>
      <a href="services.html" class="nav-link" data-i18n="nav.services"></a>
      <a href="gallery.html" class="nav-link" data-i18n="nav.gallery"></a>
      <a href="about.html" class="nav-link" data-i18n="nav.about"></a>
      <a href="contact.html" class="nav-link" data-i18n="nav.contact"></a>
    </nav>
    <div class="flex items-center gap-3">
      <a href="https://www.instagram.com/beautyloftny" target="_blank" rel="noopener" aria-label="Instagram @beautyloftny" class="w-10 h-10 flex items-center justify-center border border-[#d4af37]/30 text-[#d4af37] hover:bg-[#d4af37] hover:text-black transition">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r=".5" fill="currentColor"/></svg>
      </a>
      <button class="lang-toggle" data-lang-toggle><span data-lang="en">EN</span><span class="opacity-30">/</span><span data-lang="es">ES</span></button>
      <button id="mobile-menu-trigger" class="show-mobile w-10 h-10 flex flex-col items-center justify-center gap-1 border border-[#d4af37]/30">
        <span class="w-4 h-px bg-[#d4af37]"></span><span class="w-4 h-px bg-[#d4af37]"></span><span class="w-4 h-px bg-[#d4af37]"></span>
      </button>
    </div>
  </div>
</header>

<div id="mobile-menu" class="mobile-menu">
  <button id="mobile-menu-close" class="absolute top-6 right-6 w-12 h-12 border border-[#d4af37]/40 text-[#d4af37] text-2xl flex items-center justify-center">×</button>
  <nav>
    <a href="index.html" data-i18n="nav.home"></a>
    <a href="services.html" data-i18n="nav.services"></a>
    <a href="gallery.html" data-i18n="nav.gallery"></a>
    <a href="about.html" data-i18n="nav.about"></a>
    <a href="contact.html" data-i18n="nav.contact"></a>
  </nav>
</div>

<!-- Hero -->
<section class="relative py-16 md:py-24 px-6 border-b border-[#d4af37]/10 overflow-hidden">
  <div class="hero-bg"><img src="https://images.unsplash.com/photo-1521336575822-6da63fb45455?w=2000&auto=format&fit=crop" alt=""></div>
  <div class="absolute inset-0 bg-gradient-to-b from-[#050505]/70 to-[#050505]"></div>
  <div class="relative max-w-5xl mx-auto text-center reveal">
    <div class="ornament mb-6 max-w-sm mx-auto"><span data-i18n="booking.hero.eyebrow"></span></div>
    <h1 class="font-display text-5xl md:text-7xl mb-5 gold-text-gradient" data-i18n="booking.hero.title"></h1>
    <p class="text-[#d4d4d4] max-w-xl mx-auto" data-i18n="booking.hero.subtitle"></p>
  </div>
</section>

<!-- Square widget -->
<section class="py-12 md:py-20 px-6">
  <div class="max-w-5xl mx-auto reveal">
    <div id="square-frame" class="square-frame">
      <div class="square-loading">
        <div class="spin-ring"></div>
        <div class="text-[10px] tracking-[.4em] uppercase">Loading booking system</div>
      </div>
      <div id="square-widget-host">
        <!-- Square Appointments Embed Code -->
        <script src="https://square.site/appointments/buyer/widget/efrglpb0tnn60m/LTQM5DV6VCK1W.js"></script>
        <!-- End Square Appointments Embed Code -->
      </div>
    </div>

    <!-- Trust + fallback -->
    <div class="mt-10 grid sm:grid-cols-3 gap-6 text-center">
      <div class="card p-5">
        <div class="text-[#d4af37] text-[10px] tracking-[.3em] uppercase mb-1">Secure</div>
        <div class="text-sm text-[#a3a3a3]">Powered by Square · 256-bit encryption</div>
      </div>
      <div class="card p-5">
        <div class="text-[#d4af37] text-[10px] tracking-[.3em] uppercase mb-1">Instant</div>
        <div class="text-sm text-[#a3a3a3]">Confirmation by email + SMS</div>
      </div>
      <div class="card p-5">
        <div class="text-[#d4af37] text-[10px] tracking-[.3em] uppercase mb-1">Flexible</div>
        <div class="text-sm text-[#a3a3a3]">Reschedule up to 24h before</div>
      </div>
    </div>

    <div class="mt-10 text-center">
      <p class="text-[#7a7a7a] text-xs tracking-[.3em] uppercase mb-4">Trouble loading?</p>
      <a href="https://app.squareup.com/appointments/book/efrglpb0tnn60m/LTQM5DV6VCK1W/start" target="_top" rel="nofollow" class="btn btn-outline">
        Open booking page ↗
      </a>
    </div>
  </div>
</section>

<!-- Footer -->
<footer class="bg-[#050505] border-t border-[#d4af37]/15 pt-16 pb-10 px-6 mt-12">
  <div class="max-w-7xl mx-auto pt-6 flex flex-wrap justify-between text-xs tracking-[.3em] uppercase text-[#7a7a7a]">
    <span data-i18n="footer.copyright"></span><span data-i18n="footer.demo"></span>
  </div>
</footer>

<script src="assets/i18n.js?v=12"></script>
<script src="assets/app.js?v=12"></script>
<script>
(function(){
  const host = document.getElementById('square-widget-host');
  const frame = document.getElementById('square-frame');
  if (!host || !frame) return;
  const obs = new MutationObserver(() => {
    if (host.querySelector('iframe, [class*="square"], [id*="square"]')) {
      frame.classList.add('loaded');
      obs.disconnect();
    }
  });
  obs.observe(host, { childList:true, subtree:true });
  setTimeout(() => frame.classList.add('loaded'), 6000);
})();
</script>
</body>
</html>
