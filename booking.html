<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Book an appointment · The Beauty Loft</title>
<meta name="description" content="Reserve your moment. Choose service, stylist and time. Confirmation arrives in seconds." />
<link rel="icon" type="image/png" href="assets/img/logo.png?v=2">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500;600;700&family=Italianno&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/main.css?v=5" />
<style>
.step-panel{ display:none; animation:fadeStep .5s ease both; }
.step-panel.active{ display:block; }
@keyframes fadeStep{ from{ opacity:0; transform:translateY(20px); } to{ opacity:1; transform:translateY(0); } }
.svc-card{ cursor:pointer; transition:all .3s; }
.svc-card.selected{ border-color:#d4af37; background:linear-gradient(180deg,rgba(212,175,55,.06),rgba(212,175,55,.02)); }
.stylist-card{ cursor:pointer; transition:all .35s; }
.stylist-card.selected{ border-color:#d4af37; transform:translateY(-4px); box-shadow:0 24px 60px -20px rgba(212,175,55,.4); }
.day-cell{ cursor:pointer; transition:all .25s; aspect-ratio:1; display:flex; flex-direction:column; align-items:center; justify-content:center; border:1px solid transparent; border-radius:50%; }
.day-cell:hover:not(.disabled){ border-color:#d4af37; color:#d4af37; }
.day-cell.selected{ background:#d4af37; color:#000; border-color:#d4af37; }
.day-cell.disabled{ opacity:.25; cursor:not-allowed; }
.day-cell.today{ outline:1px dashed rgba(212,175,55,.5); outline-offset:-4px; }
.summary-card{ position:sticky; top:120px; }
@media (max-width:1023px){ .summary-card{ position:relative; top:0; } }
.fade-success{ animation:successPulse 1.4s ease both; }
@keyframes successPulse{
  0%{ transform:scale(.6); opacity:0; }
  50%{ transform:scale(1.05); opacity:1; }
  100%{ transform:scale(1); opacity:1; }
}
.checkmark{ stroke-dasharray:100; stroke-dashoffset:100; animation:drawCheck 1s ease .3s forwards; }
@keyframes drawCheck{ to{ stroke-dashoffset:0; } }
</style>
</head>
<body>

<script src="assets/i18n.js?v=5"></script>
<script src="assets/data.js?v=5"></script>
<script src="assets/app.js?v=5"></script>
<script>
const STATE = {
  step:1,
  service:null,
  stylist:null,
  date:null, // YYYY-MM-DD
  time:null,
  customer:{},
  payment:{},
  ref:null
};

// Restore from URL ?service=ID
const urlParams = new URLSearchParams(location.search);
const initialService = urlParams.get('service');
if (initialService) STATE.service = SERVICES.find(s => s.id === initialService) || PACKAGES.find(p => p.id === initialService) || null;

let activeCat = 'all';

// Render Step 1: services
function renderServicesStep() {
  const lang = window.I18nManager?.current || 'en';
  const grid = document.getElementById('services-grid');
  const items = SERVICES.filter(s => activeCat === 'all' || s.cat === activeCat);
  grid.innerHTML = items.map(s => `
    <div class="svc-card card p-4 ${STATE.service?.id===s.id?'selected':''}" data-svc="${s.id}">
      <div class="flex items-start justify-between mb-2">
        <h4 class="font-display text-lg text-cream">${s.name[lang]}</h4>
        <span class="text-[10px] tracking-[.3em] uppercase text-[#7a7a7a]">${s.duration}m</span>
      </div>
      <p class="text-xs text-[#a3a3a3] mb-3">${s.desc[lang]}</p>
      <div class="font-display text-2xl text-[#d4af37]">${s.price === 0 ? 'Free' : '$'+s.price}</div>
    </div>
  `).join('');
  grid.querySelectorAll('.svc-card').forEach(c => {
    c.addEventListener('click', () => {
      const id = c.dataset.svc;
      STATE.service = SERVICES.find(s => s.id === id);
      renderServicesStep();
      renderSummary();
      validateStep();
    });
  });
}

// Step 2: stylists
function renderStylistsStep() {
  const lang = window.I18nManager?.current || 'en';
  const grid = document.getElementById('stylists-grid');
  // Filter stylists by specialty if service selected
  const allowed = STATE.service && STATE.service.id
    ? STYLISTS.filter(s => !STATE.service || s.specialties.includes(STATE.service.id))
    : STYLISTS;
  const stylists = allowed.length ? allowed : STYLISTS;

  const cards = stylists.map(s => `
    <div class="stylist-card card overflow-hidden ${STATE.stylist?.id===s.id?'selected':''}" data-stylist="${s.id}">
      <div class="card-image aspect-[4/5]">
        <img src="${s.image}" class="w-full h-full object-cover" alt="${s.name}">
      </div>
      <div class="p-5">
        <h4 class="font-display text-2xl text-cream mb-1">${s.name}</h4>
        <p class="text-[10px] tracking-[.3em] uppercase text-[#d4af37] mb-3">${s.role[lang]} · ${s.years}+ yrs</p>
        <p class="text-xs text-[#a3a3a3] leading-relaxed">${s.bio[lang]}</p>
      </div>
    </div>
  `).join('');

  const anyCard = `
    <div class="stylist-card card overflow-hidden ${STATE.stylist?.id==='any'?'selected':''} sm:col-span-2" data-stylist="any">
      <div class="p-5 flex items-center gap-5">
        <div class="w-16 h-16 rounded-full border border-[#d4af37] flex items-center justify-center text-[#d4af37]">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M12 2l9 4-9 4-9-4 9-4zM3 12l9 4 9-4M3 17l9 4 9-4"/></svg>
        </div>
        <div>
          <h4 class="font-display text-xl text-cream mb-1" data-i18n="booking.any.stylist"></h4>
          <p class="text-xs text-[#a3a3a3]" data-i18n="booking.any.stylist.desc"></p>
        </div>
      </div>
    </div>`;

  grid.innerHTML = anyCard + cards;
  grid.querySelectorAll('.stylist-card').forEach(c => {
    c.addEventListener('click', () => {
      const id = c.dataset.stylist;
      STATE.stylist = id === 'any'
        ? { id:'any', name: lang === 'es' ? 'Primera disponible' : 'First available', role: { en:'Senior Team', es:'Equipo Senior'} }
        : STYLISTS.find(s => s.id === id);
      renderStylistsStep();
      renderSummary();
      validateStep();
    });
  });
  if (window.I18nManager) window.I18nManager.apply();
}

// Step 3: calendar
let calMonth = new Date();
calMonth.setDate(1);
function pad(n){ return String(n).padStart(2,'0'); }
function fmtDate(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function renderCalendar() {
  const lang = window.I18nManager?.current || 'en';
  const monthName = calMonth.toLocaleString(lang === 'es' ? 'es-ES' : 'en-US', { month:'long', year:'numeric' });
  document.getElementById('cal-month').textContent = monthName;

  const days = document.getElementById('cal-days');
  days.innerHTML = '';

  const firstDay = new Date(calMonth.getFullYear(), calMonth.getMonth(), 1).getDay();
  const lastDate = new Date(calMonth.getFullYear(), calMonth.getMonth() + 1, 0).getDate();
  const today = new Date(); today.setHours(0,0,0,0);

  for (let i = 0; i < firstDay; i++) {
    const cell = document.createElement('div');
    days.appendChild(cell);
  }
  for (let d = 1; d <= lastDate; d++) {
    const date = new Date(calMonth.getFullYear(), calMonth.getMonth(), d);
    const cell = document.createElement('div');
    cell.className = 'day-cell text-cream font-mono text-sm';
    cell.textContent = d;
    const past = date < today;
    const closed = BUSY_PATTERN[date.getDay()] === 'closed';
    if (past || closed) cell.classList.add('disabled');
    if (date.toDateString() === new Date().toDateString()) cell.classList.add('today');
    if (STATE.date === fmtDate(date)) cell.classList.add('selected');
    if (!past && !closed) {
      cell.addEventListener('click', () => {
        STATE.date = fmtDate(date);
        STATE.time = null;
        renderCalendar();
        renderTimes();
        renderSummary();
        validateStep();
      });
    }
    days.appendChild(cell);
  }
}

function renderTimes() {
  const wrap = document.getElementById('time-slots');
  if (!STATE.date) {
    wrap.innerHTML = '<div class="text-[#7a7a7a] text-sm col-span-3 py-12 text-center">← Pick a date first</div>';
    return;
  }
  const date = new Date(STATE.date + 'T00:00');
  const busy = BUSY_PATTERN[date.getDay()] || [];
  const closed = busy === 'closed';
  if (closed) {
    wrap.innerHTML = '<div class="text-[#7a7a7a] text-sm col-span-3 py-12 text-center">Closed this day</div>';
    return;
  }
  wrap.innerHTML = TIME_SLOTS.map(t => {
    const disabled = busy.includes(t);
    const sel = STATE.time === t;
    return `<div class="slot ${sel?'selected':''} ${disabled?'disabled':''}" data-time="${t}">${t}</div>`;
  }).join('');
  wrap.querySelectorAll('.slot:not(.disabled)').forEach(el => {
    el.addEventListener('click', () => {
      STATE.time = el.dataset.time;
      renderTimes();
      renderSummary();
      validateStep();
    });
  });
}

// Summary panel
function renderSummary() {
  const wrap = document.getElementById('summary-content');
  const lang = window.I18nManager?.current || 'en';
  const empty = !STATE.service && !STATE.stylist && !STATE.date;
  if (empty) {
    wrap.innerHTML = `<div class="text-[#7a7a7a] text-center py-8 italic">${lang === 'es' ? 'Tus selecciones aparecerán aquí.' : 'Your selections will appear here.'}</div>`;
    return;
  }
  let h = '';
  if (STATE.service) {
    h += `<div><div class="text-[10px] tracking-[.3em] uppercase text-[#7a7a7a] mb-1">${window.I18nManager.t('booking.step1')}</div><div class="text-cream font-medium">${STATE.service.name[lang]}</div><div class="text-xs text-[#a3a3a3]">${STATE.service.duration} min</div></div>`;
  }
  if (STATE.stylist) {
    h += `<div><div class="text-[10px] tracking-[.3em] uppercase text-[#7a7a7a] mb-1">${window.I18nManager.t('booking.step2')}</div><div class="text-cream font-medium">${STATE.stylist.name}</div><div class="text-xs text-[#a3a3a3]">${STATE.stylist.role?.[lang] || ''}</div></div>`;
  }
  if (STATE.date) {
    const d = new Date(STATE.date + 'T00:00');
    const f = d.toLocaleDateString(lang === 'es' ? 'es-ES' : 'en-US', { weekday:'long', month:'long', day:'numeric'});
    h += `<div><div class="text-[10px] tracking-[.3em] uppercase text-[#7a7a7a] mb-1">${window.I18nManager.t('booking.step3')}</div><div class="text-cream font-medium">${f}${STATE.time ? ' · ' + STATE.time : ''}</div></div>`;
  }
  if (STATE.service) {
    const total = STATE.service.price || 0;
    const deposit = 20;
    h += `<div class="pt-5 border-t border-[#d4af37]/15">
            <div class="flex justify-between mb-2"><span class="text-[#a3a3a3] text-sm">${lang==='es'?'Subtotal':'Subtotal'}</span><span class="text-cream font-mono">$${total}</span></div>
            <div class="flex justify-between mb-2"><span class="text-[#a3a3a3] text-sm">${lang==='es'?'Depósito hoy':'Deposit today'}</span><span class="text-[#d4af37] font-mono">$${deposit}</span></div>
            <div class="flex justify-between text-base"><span class="text-cream">${lang==='es'?'Saldo en tienda':'Pay in salon'}</span><span class="font-display text-2xl text-[#d4af37]">$${total - deposit}</span></div>
          </div>`;
    h += `<p class="text-[11px] text-[#7a7a7a] leading-relaxed">${window.I18nManager.t('booking.deposit')}</p>`;
  }
  wrap.innerHTML = h;
}

// Step navigation
function updateStepUI() {
  for (let i=1;i<=5;i++){
    const dot = document.querySelector(`[data-step-dot="${i}"]`);
    const line = document.querySelector(`[data-step-line="${i}"]`);
    dot.classList.remove('active','done');
    if (line) line.classList.remove('done');
    if (i < STATE.step) { dot.classList.add('done'); if (line) line.classList.add('done'); dot.textContent='✓'; }
    else if (i === STATE.step){ dot.classList.add('active'); dot.textContent = i; }
    else { dot.textContent = i; }
  }
  document.querySelectorAll('.step-panel').forEach(p => p.classList.remove('active'));
  const target = document.getElementById('step-' + STATE.step);
  if (target) target.classList.add('active');

  // back
  const back = document.getElementById('btn-back');
  back.disabled = STATE.step === 1;
  back.style.opacity = STATE.step === 1 ? .4 : 1;
  back.style.cursor = STATE.step === 1 ? 'not-allowed' : 'pointer';

  // next button label
  const next = document.getElementById('btn-next');
  next.dataset.i18n = STATE.step === 5 ? 'booking.pay' : 'booking.next';
  if (window.I18nManager) window.I18nManager.apply();
  validateStep();
}

function validateStep() {
  const next = document.getElementById('btn-next');
  let ok = false;
  if (STATE.step === 1) ok = !!STATE.service;
  if (STATE.step === 2) ok = !!STATE.stylist;
  if (STATE.step === 3) ok = !!STATE.date && !!STATE.time;
  if (STATE.step === 4) ok = ['f-first','f-last','f-phone','f-email'].every(id => document.getElementById(id).value.trim().length > 1);
  if (STATE.step === 5) ok = ['f-card','f-exp','f-cvc','f-zip','f-cardname'].every(id => document.getElementById(id).value.trim().length > 1);
  next.disabled = !ok;
  next.style.opacity = ok ? 1 : .4;
  next.style.cursor = ok ? 'pointer' : 'not-allowed';
}

document.addEventListener('input', validateStep);

document.getElementById('btn-back').addEventListener('click', () => {
  if (STATE.step > 1) { STATE.step--; updateStepUI(); window.scrollTo({top:0,behavior:'smooth'}); }
});

document.getElementById('btn-next').addEventListener('click', async () => {
  if (STATE.step === 4) {
    STATE.customer = {
      first: document.getElementById('f-first').value,
      last: document.getElementById('f-last').value,
      phone: document.getElementById('f-phone').value,
      email: document.getElementById('f-email').value,
      notes: document.getElementById('f-notes').value
    };
  }
  if (STATE.step === 5) {
    STATE.payment = {
      card: '**** ' + document.getElementById('f-card').value.slice(-4),
      exp: document.getElementById('f-exp').value
    };
    return await processPayment();
  }
  STATE.step++;
  if (STATE.step === 2) renderStylistsStep();
  if (STATE.step === 3) { renderCalendar(); renderTimes(); }
  updateStepUI();
  window.scrollTo({top:0,behavior:'smooth'});
});

// Calendar nav
document.getElementById('cal-prev').addEventListener('click', () => {
  calMonth.setMonth(calMonth.getMonth() - 1);
  renderCalendar();
});
document.getElementById('cal-next').addEventListener('click', () => {
  calMonth.setMonth(calMonth.getMonth() + 1);
  renderCalendar();
});

// Service category tabs in step 1
document.querySelectorAll('#step-1 .cat-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    activeCat = tab.dataset.cat;
    document.querySelectorAll('#step-1 .cat-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    renderServicesStep();
  });
});

// Card formatting
const cardInp = document.getElementById('f-card');
cardInp?.addEventListener('input', e => {
  let v = e.target.value.replace(/\s/g,'').replace(/\D/g,'');
  v = v.match(/.{1,4}/g)?.join(' ') || '';
  e.target.value = v;
  const brand = document.getElementById('card-brand');
  if (v.startsWith('4')) brand.textContent = 'VISA';
  else if (/^(5[1-5]|2[2-7])/.test(v)) brand.textContent = 'MC';
  else if (/^3[47]/.test(v)) brand.textContent = 'AMEX';
  else brand.textContent = '';
});
const expInp = document.getElementById('f-exp');
expInp?.addEventListener('input', e => {
  let v = e.target.value.replace(/\D/g,'').slice(0,4);
  if (v.length >= 3) v = v.slice(0,2) + ' / ' + v.slice(2);
  e.target.value = v;
});
document.getElementById('f-cvc')?.addEventListener('input', e => e.target.value = e.target.value.replace(/\D/g,''));
document.getElementById('f-zip')?.addEventListener('input', e => e.target.value = e.target.value.replace(/\D/g,''));

// Apple/Google pay buttons trigger same flow
document.getElementById('pay-apple')?.addEventListener('click', () => {
  STATE.payment = { method:'apple' };
  processPayment();
});
document.getElementById('pay-google')?.addEventListener('click', () => {
  STATE.payment = { method:'google' };
  processPayment();
});

async function processPayment() {
  // Show overlay
  const ov = document.createElement('div');
  ov.style.cssText = 'position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;backdrop-filter:blur(20px)';
  ov.innerHTML = `
    <div class="font-display text-3xl text-[#d4af37] mb-6">${window.I18nManager.t('pay.processing')}</div>
    <div class="page-loader-bar"></div>
  `;
  document.body.appendChild(ov);
  await new Promise(r => setTimeout(r, 2200));
  ov.remove();

  // Generate ref
  STATE.ref = 'BL-' + Date.now().toString(36).toUpperCase().slice(-6);
  saveBooking();
  showSuccess();
}

function saveBooking() {
  const all = JSON.parse(localStorage.getItem('beautyloft.bookings') || '[]');
  all.push({ ...STATE, createdAt: new Date().toISOString() });
  localStorage.setItem('beautyloft.bookings', JSON.stringify(all));
}

function showSuccess() {
  document.querySelectorAll('.step-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('step-success').classList.add('active');
  document.getElementById('nav-controls').style.display = 'none';
  document.getElementById('success-ref').textContent = STATE.ref;
  // mark all step dots done
  for (let i=1;i<=5;i++){
    const dot = document.querySelector(`[data-step-dot="${i}"]`);
    const line = document.querySelector(`[data-step-line="${i}"]`);
    dot.classList.add('done'); dot.textContent='✓';
    if (line) line.classList.add('done');
  }
  // success summary
  const lang = window.I18nManager?.current || 'en';
  const d = new Date(STATE.date + 'T00:00');
  const f = d.toLocaleDateString(lang === 'es' ? 'es-ES' : 'en-US', { weekday:'long', month:'long', day:'numeric'});
  document.getElementById('success-summary').innerHTML = `
    <div class="card p-6 text-left">
      <div class="space-y-3 text-sm">
        <div class="flex justify-between"><span class="text-[#7a7a7a]">${window.I18nManager.t('booking.step1')}</span><span class="text-cream">${STATE.service.name[lang]}</span></div>
        <div class="flex justify-between"><span class="text-[#7a7a7a]">${window.I18nManager.t('booking.step2')}</span><span class="text-cream">${STATE.stylist.name}</span></div>
        <div class="flex justify-between"><span class="text-[#7a7a7a]">${window.I18nManager.t('booking.step3')}</span><span class="text-cream">${f} · ${STATE.time}</span></div>
        <div class="flex justify-between pt-3 border-t border-[#d4af37]/15"><span class="text-[#7a7a7a]">${lang==='es'?'Depósito':'Deposit'}</span><span class="text-[#d4af37] font-mono">$20</span></div>
      </div>
    </div>
  `;
  window.scrollTo({top:0,behavior:'smooth'});
}

// Calendar download (simple .ics)
function downloadIcs() {
  if (!STATE.date || !STATE.time) return;
  const start = new Date(STATE.date + 'T' + STATE.time + ':00');
  const end = new Date(start.getTime() + STATE.service.duration * 60000);
  const fmt = d => d.toISOString().replace(/[-:]|\.\d{3}/g,'');
  const ics = `BEGIN:VCALENDAR
VERSION:2.0
PRODID:-//The Beauty Loft//EN
BEGIN:VEVENT
UID:${STATE.ref}@beautyloftny.com
DTSTAMP:${fmt(new Date())}
DTSTART:${fmt(start)}
DTEND:${fmt(end)}
SUMMARY:The Beauty Loft - ${STATE.service.name.en}
LOCATION:240 E 28th Street\\, New York\\, NY 10016
DESCRIPTION:Booking ${STATE.ref}\\n${STATE.service.name.en}\\nStylist: ${STATE.stylist.name}
END:VEVENT
END:VCALENDAR`;
  const blob = new Blob([ics], { type:'text/calendar' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `beauty-loft-${STATE.ref}.ics`;
  a.click();
  URL.revokeObjectURL(url);
  window.toast(window.I18nManager.current === 'es' ? '✓ Archivo descargado' : '✓ Calendar file downloaded');
}
window.downloadIcs = downloadIcs;

// Init
document.addEventListener('DOMContentLoaded', () => {
  renderServicesStep();
  renderSummary();
  validateStep();
  if (initialService && STATE.service) {
    // Auto-advance to step 2
    STATE.step = 2;
    renderStylistsStep();
    updateStepUI();
  }
});
document.addEventListener('langchange', () => {
  renderServicesStep();
  if (STATE.step >= 2) renderStylistsStep();
  if (STATE.step >= 3) { renderCalendar(); renderTimes(); }
  renderSummary();
});

// Style active cat tab
const s = document.createElement('style');
s.textContent = `.cat-tab.active{background:#d4af37;color:#000;border-color:#d4af37;}`;
document.head.appendChild(s);
</script>
</body>
