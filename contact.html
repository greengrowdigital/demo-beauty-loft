<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contact · The Beauty Loft</title>
<meta name="description" content="Visit us at 240 E 28th Street, Kips Bay, Manhattan." />
<link rel="icon" type="image/png" href="assets/img/logo.png?v=2">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500;600;700&family=Italianno&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/main.css?v=11" />
</head>
<body>

<div class="page-loader"><div class="page-loader-inner"><img src="assets/img/logo.png?v=2" alt="The Beauty Loft" class="page-loader-logo-img"><div class="page-loader-bar"></div></div></div>
<div id="scroll-progress" style="position:fixed;top:0;left:0;height:2px;background:linear-gradient(90deg,#a88a2e,#d4af37,#f4e4ba);width:0;z-index:101"></div>

<div class="bg-[#0a0a0a] text-[#d4af37] py-2.5 px-6 text-center border-b border-[#d4af37]/15">
  <div class="text-xs tracking-[.32em] uppercase">
    <span data-i18n="top.bar"></span><span class="mx-4 opacity-50">·</span>
    <a href="booking.html" class="underline underline-offset-4 hover:text-[#f4e4ba]" data-i18n="top.cta"></a>
  </div>
</div>

<header id="navbar" class="sticky top-0 z-50 bg-[#050505]/95 backdrop-blur-md border-b border-[#d4af37]/10">
  <div class="max-w-7xl mx-auto flex items-center justify-between px-6 py-5">
    <a href="index.html" class="flex items-center">
      <img src="assets/img/logo.png?v=2" alt="The Beauty Loft" class="brand-logo">
    </a>
    <nav class="hidden lg:flex items-center gap-8">
      <a href="index.html" class="nav-link" data-i18n="nav.home"></a>
      <a href="services.html" class="nav-link" data-i18n="nav.services"></a>
      <a href="gallery.html" class="nav-link" data-i18n="nav.gallery"></a>
      <a href="about.html" class="nav-link" data-i18n="nav.about"></a>
      <a href="contact.html" class="nav-link active" data-i18n="nav.contact"></a>
    </nav>
    <div class="flex items-center gap-3">
      <a href="https://www.instagram.com/beautyloftny" target="_blank" rel="noopener" aria-label="Instagram @beautyloftny" class="w-10 h-10 flex items-center justify-center border border-[#d4af37]/30 text-[#d4af37] hover:bg-[#d4af37] hover:text-black transition">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r=".5" fill="currentColor"/></svg>
      </a>
      <button class="lang-toggle" data-lang-toggle><span data-lang="en">EN</span><span class="opacity-30">/</span><span data-lang="es">ES</span></button>
      <a href="booking.html" class="btn btn-gold gold-shine hide-mobile" data-i18n="nav.bookNow"></a>
      <button id="mobile-menu-trigger" class="show-mobile w-10 h-10 flex flex-col items-center justify-center gap-1 border border-[#d4af37]/30">
        <span class="w-4 h-px bg-[#d4af37]"></span><span class="w-4 h-px bg-[#d4af37]"></span><span class="w-4 h-px bg-[#d4af37]"></span>
      </button>
    </div>
  </div>
</header>

<div id="mobile-menu" class="mobile-menu">
  <button id="mobile-menu-close" class="absolute top-6 right-6 w-12 h-12 border border-[#d4af37]/40 text-[#d4af37] text-2xl flex items-center justify-center">×</button>
  <nav>
    <a href="index.html" data-i18n="nav.home"></a>
    <a href="services.html" data-i18n="nav.services"></a>
    <a href="gallery.html" data-i18n="nav.gallery"></a>
    <a href="about.html" data-i18n="nav.about"></a>
    <a href="contact.html" data-i18n="nav.contact"></a>
    <a href="booking.html" class="text-[#d4af37]" data-i18n="nav.bookNow"></a>
  </nav>
</div>

<!-- Hero -->
<section class="relative py-20 md:py-28 px-6 overflow-hidden border-b border-[#d4af37]/10">
  <div class="hero-bg"><img src="https://images.unsplash.com/photo-1469371670807-013ccf25f16a?w=2000&auto=format&fit=crop" alt=""></div>
  <div class="absolute inset-0 bg-gradient-to-b from-[#050505]/60 via-[#050505]/80 to-[#050505]"></div>
  <div class="relative max-w-5xl mx-auto text-center reveal">
    <div class="ornament mb-6 max-w-sm mx-auto"><span data-i18n="contact.hero.eyebrow"></span></div>
    <h1 class="font-display text-6xl md:text-8xl mb-6 gold-text-gradient" data-i18n="contact.hero.title"></h1>
    <p class="text-[#d4d4d4] max-w-2xl mx-auto text-lg" data-i18n="contact.hero.subtitle"></p>
  </div>
</section>

<!-- Map + info -->
<section class="py-16 md:py-24 px-6">
  <div class="max-w-7xl mx-auto grid lg:grid-cols-2 gap-12">

    <div class="reveal reveal-left">
      <div class="card-image aspect-[4/3] mb-8" style="border:1px solid var(--line)">
        <iframe
          src="https://www.google.com/maps?q=240+E+28th+Street,+New+York,+NY+10016&output=embed"
          width="100%" height="100%" style="border:0;filter:invert(.92) hue-rotate(180deg) saturate(.4) contrast(1.1);"
          allowfullscreen="" loading="lazy"></iframe>
      </div>

      <h3 class="font-display text-3xl mb-6 text-cream" data-i18n="contact.info.title"></h3>

      <div class="space-y-5">
        <div class="flex gap-4 items-start">
          <div class="w-10 h-10 border border-[#d4af37] rounded-full flex items-center justify-center text-[#d4af37] flex-shrink-0">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 22s-8-7-8-13a8 8 0 1116 0c0 6-8 13-8 13z"/><circle cx="12" cy="9" r="3"/></svg>
          </div>
          <div>
            <div class="text-[10px] tracking-[.3em] uppercase text-[#d4af37] mb-1" data-i18n="contact.info.address"></div>
            <div class="text-cream">240 E 28th Street, New York, NY 10016</div>
            <a href="https://maps.google.com/?q=240+E+28th+Street+New+York" target="_blank" class="text-xs tracking-[.3em] uppercase text-[#d4af37] hover:text-[#f4e4ba] mt-1 inline-block">→ Google Maps</a>
          </div>
        </div>

        <div class="flex gap-4 items-start">
          <div class="w-10 h-10 border border-[#d4af37] rounded-full flex items-center justify-center text-[#d4af37] flex-shrink-0">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.13.96.37 1.9.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.91.33 1.85.57 2.81.7a2 2 0 011.72 2z"/></svg>
          </div>
          <div>
            <div class="text-[10px] tracking-[.3em] uppercase text-[#d4af37] mb-1" data-i18n="contact.info.phone"></div>
            <a href="tel:+12125550100" class="text-cream hover:text-[#d4af37]">+1 (212) 555-0100</a>
          </div>
        </div>

        <div class="flex gap-4 items-start">
          <div class="w-10 h-10 border border-[#d4af37] rounded-full flex items-center justify-center text-[#d4af37] flex-shrink-0">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 6l10 7 10-7"/></svg>
          </div>
          <div>
            <div class="text-[10px] tracking-[.3em] uppercase text-[#d4af37] mb-1" data-i18n="contact.info.email"></div>
            <a href="mailto:hello@beautyloftny.com" class="text-cream hover:text-[#d4af37]">hello@beautyloftny.com</a>
          </div>
        </div>

        <div class="flex gap-4 items-start">
          <div class="w-10 h-10 border border-[#d4af37] rounded-full flex items-center justify-center text-[#d4af37] flex-shrink-0">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
          </div>
          <div>
            <div class="text-[10px] tracking-[.3em] uppercase text-[#d4af37] mb-1" data-i18n="contact.info.hours"></div>
            <ul class="text-cream space-y-1">
              <li data-i18n="footer.hours.weekdays"></li>
              <li data-i18n="footer.hours.sat"></li>
              <li data-i18n="footer.hours.sun"></li>
            </ul>
          </div>
        </div>

        <div class="flex gap-4 items-start">
          <div class="w-10 h-10 border border-[#d4af37] rounded-full flex items-center justify-center text-[#d4af37] flex-shrink-0">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r=".5" fill="currentColor"/></svg>
          </div>
          <div>
            <div class="text-[10px] tracking-[.3em] uppercase text-[#d4af37] mb-1">Instagram</div>
            <a href="https://www.instagram.com/beautyloftny" target="_blank" class="text-cream hover:text-[#d4af37]">@beautyloftny</a>
          </div>
        </div>
      </div>
    </div>

    <div class="reveal reveal-right">
      <div class="card p-8 md:p-10">
        <h3 class="font-display text-3xl mb-2 text-cream" data-i18n="contact.form.title"></h3>
        <div class="font-script text-3xl text-[#d4af37] mb-8">we'd love to hear from you</div>

        <form id="contact-form" class="space-y-5">
          <div>
            <label class="input-label" data-i18n="contact.form.name"></label>
            <input type="text" required class="input">
          </div>
          <div class="grid sm:grid-cols-2 gap-5">
            <div>
              <label class="input-label" data-i18n="contact.form.email"></label>
              <input type="email" required class="input">
            </div>
            <div>
              <label class="input-label" data-i18n="contact.form.phone"></label>
              <input type="tel" class="input">
            </div>
          </div>
          <div>
            <label class="input-label" data-i18n="contact.form.subject"></label>
            <select class="input">
              <option>General inquiry</option>
              <option>Booking question</option>
              <option>Bridal package</option>
              <option>Press / partnership</option>
            </select>
          </div>
          <div>
            <label class="input-label" data-i18n="contact.form.message"></label>
            <textarea rows="5" required class="input"></textarea>
          </div>
          <button type="submit" class="btn btn-gold gold-shine w-full" data-i18n="contact.form.send"></button>
        </form>
      </div>
    </div>
  </div>
</section>

<!-- Footer -->
<footer class="bg-[#050505] border-t border-[#d4af37]/15 pt-16 pb-10 px-6 mt-12">
  <div class="max-w-7xl mx-auto pt-6 flex flex-wrap justify-between text-xs tracking-[.3em] uppercase text-[#7a7a7a]">
    <span data-i18n="footer.copyright"></span><span data-i18n="footer.demo"></span>
  </div>
</footer>

<script src="assets/i18n.js?v=11"></script>
<script src="assets/data.js?v=11"></script>
<script src="assets/app.js?v=11"></script>
<script>
document.getElementById('contact-form').addEventListener('submit', e => {
  e.preventDefault();
  window.toast(window.I18nManager.t('contact.form.success'));
  e.target.reset();
});
</script>
</body>
</html>
