<title>Gallery · The Beauty Loft</title>

<style>
.gallery-grid { columns: 2; column-gap: 12px; }
@media(min-width:768px){ .gallery-grid{ columns: 3; } }
@media(min-width:1024px){ .gallery-grid{ columns: 4; } }
.gallery-grid > * { break-inside: avoid; margin-bottom: 12px; display:block; }
.lightbox { position:fixed; inset:0; z-index:9000; background:rgba(0,0,0,.96); display:none; align-items:center; justify-content:center; padding:20px; }
.lightbox.open { display:flex; }
.lightbox img, .lightbox video { max-width:92vw; max-height:88vh; object-fit:contain; box-shadow:0 32px 80px rgba(212,175,55,.3); }
.lb-close { position:absolute; top:24px; right:24px; width:48px; height:48px; border:1px solid #d4af37; color:#d4af37; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:24px; }
.lb-prev,.lb-next { position:absolute; top:50%; transform:translateY(-50%); width:48px; height:48px; border:1px solid #d4af37; color:#d4af37; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:28px; }
.lb-prev{ left:24px; } .lb-next{ right:24px; }
.video-badge { position:absolute; top:10px; right:10px; width:30px; height:30px; border-radius:50%; background:rgba(212,175,55,.92); color:#000; display:flex; align-items:center; justify-content:center; pointer-events:none; box-shadow:0 4px 12px rgba(0,0,0,.4); }
.video-badge svg { width:14px; height:14px; }
.gallery-grid a { position:relative; }
.gallery-grid video { width:100%; display:block; }
</style>
</head>
<body>

    <a href="booking.html" class="underline underline-offset-4 hover:text-[#f4e4ba]" data-i18n="top.cta"></a>

    <a href="index.html" class="flex items-center">
      <img src="assets/img/logo.png?v=2" alt="The Beauty Loft" class="brand-logo">
    </a>
    <nav class="hidden lg:flex items-center gap-8">
      <a href="index.html" class="nav-link" data-i18n="nav.home"></a>
      <a href="services.html" class="nav-link" data-i18n="nav.services"></a>
      <a href="gallery.html" class="nav-link active" data-i18n="nav.gallery"></a>
      <a href="about.html" class="nav-link" data-i18n="nav.about"></a>
      <a href="contact.html" class="nav-link" data-i18n="nav.contact"></a>
    </nav>
    <div class="flex items-center gap-3">
      <a href="https://www.instagram.com/beautyloftny" target="_blank" rel="noopener" aria-label="Instagram @beautyloftny" class="w-10 h-10 flex items-center justify-center border border-[#d4af37]/30 text-[#d4af37] hover:bg-[#d4af37] hover:text-black transition">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r=".5" fill="currentColor"/></svg>

        <span class="w-4 h-px bg-[#d4af37]"></span><span class="w-4 h-px bg-[#d4af37]"></span><span class="w-4 h-px bg-[#d4af37]"></span>

  <nav>

    <a href="gallery.html" data-i18n="nav.gallery"></a>
    <a href="about.html" data-i18n="nav.about"></a>
    <a href="contact.html" data-i18n="nav.contact"></a>
    <a href="booking.html" class="text-[#d4af37]" data-i18n="nav.bookNow"></a>

<section class="relative py-20 md:py-28 px-6 overflow-hidden border-b border-[#d4af37]/10">
  <div class="hero-bg"><img src="https://images.unsplash.com/photo-1522337094846-8a818192de1f?w=2000&auto=format&fit=crop" alt=""></div>
  <div class="absolute inset-0 bg-gradient-to-b from-[#050505]/60 via-[#050505]/80 to-[#050505]"></div>
  <div class="relative max-w-5xl mx-auto text-center reveal">

<!-- Filter -->

  <div class="max-w-6xl mx-auto flex gap-2 justify-center flex-wrap">
    <button class="g-tab btn btn-ghost active" data-cat="all" data-i18n="gallery.filter.all"></button>
    <button class="g-tab btn btn-ghost" data-cat="color" data-i18n="gallery.filter.color"></button>
    <button class="g-tab btn btn-ghost" data-cat="cuts" data-i18n="gallery.filter.cuts"></button>
    <button class="g-tab btn btn-ghost" data-cat="lashes" data-i18n="gallery.filter.lashes"></button>
    <button class="g-tab btn btn-ghost" data-cat="facials" data-i18n="gallery.filter.facials"></button>
    <button class="g-tab btn btn-ghost" data-cat="bridal" data-i18n="gallery.filter.bridal"></button>
  </div>
</section>

<!-- Gallery -->
<section class="py-16 px-6">
  <div class="max-w-7xl mx-auto">
    <div id="gallery" class="gallery-grid"></div>
  </div>
</section>

<!-- Lightbox -->
<div id="lightbox" class="lightbox">
  <button class="lb-close" id="lb-close">×</button>
  <button class="lb-prev" id="lb-prev">‹</button>
  <button class="lb-next" id="lb-next">›</button>
  <img id="lb-img" src="" alt="" style="display:none">
  <video id="lb-video" src="" controls playsinline style="display:none"></video>
</div>

<!-- CTA -->
<section class="py-24 px-6 bg-[#0a0a0a] border-y border-[#d4af37]/10 text-center">
  <div class="max-w-2xl mx-auto reveal">
    <div class="font-script text-5xl text-[#d4af37] mb-3" data-i18n="cta.title"></div>
    <h3 class="font-display text-3xl md:text-4xl mb-8 text-cream" data-i18n="cta.subtitle"></h3>
    <a href="booking.html" class="btn btn-gold gold-shine" data-i18n="cta.book"></a>
  </div>
</section>

<footer class="bg-[#050505] border-t border-[#d4af37]/15 pt-16 pb-10 px-6">
  <div class="max-w-7xl mx-auto pt-6 flex flex-wrap justify-between text-xs tracking-[.3em] uppercase text-[#7a7a7a]">
    <span data-i18n="footer.copyright"></span><span data-i18n="footer.demo"></span>
  </div>
</footer>

<script src="assets/i18n.js?v=11"></script>
<script src="assets/data.js?v=11"></script>
<script src="assets/app.js?v=11"></script>
<script>
let activeCat = 'all';
let visibleItems = [];
const grid = document.getElementById('gallery');

const isVideo = g => g.type === 'video' || (g.src && /\.(mp4|webm|mov)$/i.test(g.src));
const PLAY_BADGE = `<span class="video-badge"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></span>`;

function renderGallery() {
  visibleItems = activeCat === 'all' ? GALLERY : GALLERY.filter(g => g.cat === activeCat);
  grid.innerHTML = visibleItems.map((g, i) => {
    if (isVideo(g)) {
      return `
        <a href="#" data-idx="${i}" class="block card-image">
          <video src="${g.src}" poster="${g.poster || ''}" muted loop playsinline autoplay preload="metadata"></video>
          ${PLAY_BADGE}
        </a>`;
    }
    return `
      <a href="#" data-idx="${i}" class="block card-image">
        <img src="${g.img}" alt="${g.cat}" class="w-full" loading="lazy">
      </a>`;
  }).join('');
  grid.querySelectorAll('a').forEach(a => {
    a.addEventListener('click', e => {
      e.preventDefault();
      openLightbox(parseInt(a.dataset.idx));
    });
  });
}

document.querySelectorAll('.g-tab').forEach(t => {
  t.addEventListener('click', () => {
    activeCat = t.dataset.cat;
    document.querySelectorAll('.g-tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    renderGallery();
  });
});

const lb = document.getElementById('lightbox');
const lbImg = document.getElementById('lb-img');
const lbVid = document.getElementById('lb-video');
let lbIdx = 0;
function showLbItem(item){
  if (isVideo(item)) {
    lbImg.style.display = 'none';
    lbImg.src = '';
    lbVid.style.display = 'block';
    lbVid.src = item.src;
    lbVid.play().catch(()=>{});
  } else {
    lbVid.pause(); lbVid.src = ''; lbVid.style.display = 'none';
    lbImg.src = item.img;
    lbImg.style.display = 'block';
  }
}
function openLightbox(i){ lbIdx = i; showLbItem(visibleItems[i]); lb.classList.add('open'); }
function closeLightbox(){ lb.classList.remove('open'); lbVid.pause(); lbVid.src = ''; }
function nav(d){ lbIdx = (lbIdx + d + visibleItems.length) % visibleItems.length; showLbItem(visibleItems[lbIdx]); }
document.getElementById('lb-close').addEventListener('click', closeLightbox);
document.getElementById('lb-prev').addEventListener('click', () => nav(-1));
document.getElementById('lb-next').addEventListener('click', () => nav(1));
document.addEventListener('keydown', e => {
  if (!lb.classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') nav(-1);
  if (e.key === 'ArrowRight') nav(1);
});
lb.addEventListener('click', e => { if (e.target === lb) closeLightbox(); });

document.addEventListener('DOMContentLoaded', renderGallery);
const s = document.createElement('style');
s.textContent = `.g-tab.active{background:#d4af37;color:#000;border-color:#d4af37;}`;
document.head.appendChild(s);
</script>
</body>
</html>
