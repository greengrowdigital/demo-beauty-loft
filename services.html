<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<body>

<!-- Top bar -->

<!-- Navbar -->
<header id="navbar" class="sticky top-0 z-50 bg-[#050505]/95 backdrop-blur-md border-b border-[#d4af37]/10">
  <div class="max-w-7xl mx-auto flex items-center justify-between px-6 py-5">
    <a href="index.html" class="flex items-center">
      <img src="public/logona.png" alt="The Beauty Loft" class="brand-logo">
    </a>
    <nav class="hidden lg:flex items-center gap-8">
      <a href="index.html" class="nav-link" data-i18n="nav.home"></a>
      <a href="services.html" class="nav-link active" data-i18n="nav.services"></a>
      <a href="gallery.html" class="nav-link" data-i18n="nav.gallery"></a>
      <a href="about.html" class="nav-link" data-i18n="nav.about"></a>
      <a href="contact.html" class="nav-link" data-i18n="nav.contact"></a>
    </nav>
    <div class="flex items-center gap-3">
      <button class="lang-toggle" data-lang-toggle><span data-lang="en">EN</span><span class="opacity-30">/</span><span data-lang="es">ES</span></button>
      <a href="booking.html" class="btn btn-gold gold-shine hide-mobile" data-i18n="nav.bookNow"></a>
      <button id="mobile-menu-trigger" class="show-mobile w-10 h-10 flex flex-col items-center justify-center gap-1 border border-[#d4af37]/30">
        <span class="w-4 h-px bg-[#d4af37]"></span><span class="w-4 h-px bg-[#d4af37]"></span><span class="w-4 h-px bg-[#d4af37]"></span>
      </button>
    </div>
  </div>
</header>

<div id="mobile-menu" class="mobile-menu">
  <button id="mobile-menu-close" class="absolute top-6 right-6 w-12 h-12 border border-[#d4af37]/40 text-[#d4af37] text-2xl flex items-center justify-center">×</button>
  <nav>
    <a href="index.html" data-i18n="nav.home"></a>
    <a href="services.html" data-i18n="nav.services"></a>
    <a href="gallery.html" data-i18n="nav.gallery"></a>
    <a href="about.html" data-i18n="nav.about"></a>
    <a href="contact.html" data-i18n="nav.contact"></a>
    <a href="booking.html" class="text-[#d4af37]" data-i18n="nav.bookNow"></a>
  </nav>
</div>

<!-- Page hero -->
<section class="relative py-20 md:py-28 px-6 overflow-hidden border-b border-[#d4af37]/10">
  <div class="hero-bg"><img src="https://images.unsplash.com/photo-1522337660859-02fbefca4702?w=2000&auto=format&fit=crop" alt=""></div>
  <div class="absolute inset-0 bg-gradient-to-b from-[#050505]/60 via-[#050505]/80 to-[#050505]"></div>
  <div class="relative max-w-5xl mx-auto text-center reveal">
    <div class="ornament mb-6 max-w-sm mx-auto"><span data-i18n="services.page.hero.eyebrow"></span></div>
    <h1 class="font-display text-6xl md:text-8xl mb-6 gold-text-gradient glow-text" data-i18n="services.page.hero.title"></h1>
    <p class="text-[#d4d4d4] max-w-2xl mx-auto text-lg" data-i18n="services.page.hero.subtitle"></p>
  </div>
</section>

<!-- Filter tabs -->
<section class="sticky top-[72px] z-40 bg-[#050505]/95 backdrop-blur-md border-b border-[#d4af37]/10 py-4 px-6">
  <div class="max-w-7xl mx-auto flex gap-2 overflow-x-auto no-scrollbar">
    <button class="cat-tab btn-ghost btn flex-shrink-0 active" data-cat="all">All</button>
    <button class="cat-tab btn-ghost btn flex-shrink-0" data-cat="hair" data-i18n="services.cat.hair"></button>
    <button class="cat-tab btn-ghost btn flex-shrink-0" data-cat="color" data-i18n="services.cat.color"></button>
    <button class="cat-tab btn-ghost btn flex-shrink-0" data-cat="lashes" data-i18n="services.cat.lashes"></button>
    <button class="cat-tab btn-ghost btn flex-shrink-0" data-cat="skin" data-i18n="services.cat.skin"></button>
    <button class="cat-tab btn-ghost btn flex-shrink-0" data-cat="waxing" data-i18n="services.cat.waxing"></button>
    <button class="cat-tab btn-ghost btn flex-shrink-0" data-cat="treatments" data-i18n="services.cat.treatments"></button>
    <button class="cat-tab btn-ghost btn flex-shrink-0" data-cat="extensions" data-i18n="services.cat.extensions"></button>
  </div>
</section>

<!-- Services list -->
<section class="py-20 md:py-28 px-6">
  <div class="max-w-6xl mx-auto">
    <div id="services-list" class="space-y-20"></div>

    <p class="text-center text-[#7a7a7a] text-sm mt-20 max-w-2xl mx-auto" data-i18n="services.note"></p>
  </div>
</section>

<!-- CTA -->
<section class="relative py-24 md:py-28 px-6 bg-[#0a0a0a] border-y border-[#d4af37]/10 text-center">
  <div class="max-w-2xl mx-auto reveal">
    <div class="font-script text-5xl text-[#d4af37] mb-3" data-i18n="cta.title"></div>
    <h3 class="font-display text-3xl md:text-4xl mb-8 text-cream" data-i18n="cta.subtitle"></h3>
    <a href="booking.html" class="btn btn-gold gold-shine" data-i18n="cta.book"></a>
  </div>
</section>

<!-- Footer -->
<footer class="bg-[#050505] border-t border-[#d4af37]/15 pt-16 pb-10 px-6">
  <div class="max-w-7xl mx-auto grid md:grid-cols-4 gap-12 mb-12">
    <div>
      <a href="index.html" class="inline-block mb-3">
        <img src="public/logona.png" alt="The Beauty Loft" class="brand-logo">
      </a>
      <p class="text-xs tracking-[.32em] uppercase text-[#7a7a7a]" data-i18n="footer.tag"></p>
    </div>
    <div><h4 class="text-xs tracking-[.32em] uppercase text-[#d4af37] mb-4" data-i18n="footer.find.title"></h4>
      <p class="text-[#a3a3a3] text-sm mb-2" data-i18n="footer.address"></p>
      <a href="https://www.instagram.com/beautyloftny" target="_blank" class="text-sm text-[#a3a3a3] hover:text-[#d4af37]">@beautyloftny</a>
    </div>
    <div><h4 class="text-xs tracking-[.32em] uppercase text-[#d4af37] mb-4" data-i18n="footer.hours.title"></h4>
      <ul class="space-y-1.5 text-sm text-[#a3a3a3]"><li data-i18n="footer.hours.weekdays"></li><li data-i18n="footer.hours.sat"></li><li data-i18n="footer.hours.sun"></li><li data-i18n="footer.hours.mon"></li></ul>
    </div>
    <div><h4 class="text-xs tracking-[.32em] uppercase text-[#d4af37] mb-4" data-i18n="footer.newsletter.title"></h4>
      <form data-newsletter class="flex"><input type="email" required class="input flex-1" data-i18n-placeholder="footer.newsletter.placeholder"><button type="submit" class="btn btn-gold" style="padding:.95rem 1rem" data-i18n="footer.newsletter.cta"></button></form>
    </div>
  </div>
  <div class="max-w-7xl mx-auto pt-6 border-t border-[#d4af37]/10 flex flex-wrap justify-between text-xs tracking-[.3em] uppercase text-[#7a7a7a]">
    <span data-i18n="footer.copyright"></span><span data-i18n="footer.demo"></span>
  </div>
</footer>

<script src="assets/i18n.js"></script>
<script src="assets/data.js"></script>
<script src="assets/app.js"></script>
<script>
const CAT_LABELS = {
  hair: 'services.cat.hair',
  color: 'services.cat.color',
  lashes: 'services.cat.lashes',
  skin: 'services.cat.skin',
  waxing: 'services.cat.waxing',
  treatments: 'services.cat.treatments',
  extensions: 'services.cat.extensions'
};
const CAT_IMG = {
  hair:'https://images.unsplash.com/photo-1560066984-138dadb4c035?w=900&auto=format&fit=crop',
  color:'https://images.unsplash.com/photo-1522337360788-8b13dee7a37e?w=900&auto=format&fit=crop',
  lashes:'https://images.unsplash.com/photo-1583241800698-9c2e1f72a37b?w=900&auto=format&fit=crop',
  skin:'https://images.unsplash.com/photo-1570172619644-dfd03ed5d881?w=900&auto=format&fit=crop',
  waxing:'https://images.unsplash.com/photo-1631730486572-226d1f595b68?w=900&auto=format&fit=crop',
  treatments:'https://images.unsplash.com/photo-1559599101-f09722fb4948?w=900&auto=format&fit=crop',
  extensions:'https://images.unsplash.com/photo-1492106087820-71f1a00d2b11?w=900&auto=format&fit=crop'
};

let activeCategory = 'all';
const list = document.getElementById('services-list');

function renderServices() {
  const lang = window.I18nManager?.current || 'en';
  const cats = ['hair','color','lashes','skin','waxing','treatments','extensions'];

  list.innerHTML = cats
    .filter(cat => activeCategory === 'all' || activeCategory === cat)
    .map(cat => {
      const items = SERVICES.filter(s => s.cat === cat);
      if (items.length === 0) return '';
      const rows = items.map(s => `
        <div class="grid grid-cols-12 gap-4 py-6 border-b border-[#d4af37]/10 items-center group hover:bg-[#0a0a0a] transition-all px-4 -mx-4">
          <div class="col-span-12 md:col-span-6">
            <h4 class="font-display text-2xl text-cream mb-1 group-hover:text-[#d4af37] transition">${s.name[lang]}</h4>
            <p class="text-[#a3a3a3] text-sm">${s.desc[lang]}</p>
          </div>
          <div class="col-span-4 md:col-span-2 font-mono text-sm text-[#7a7a7a]">${s.duration} ${window.I18nManager.t('common.minutes')}</div>
          <div class="col-span-4 md:col-span-2">
            ${s.price === 0
              ? `<span class="font-display text-2xl text-[#d4af37]">Free</span>`
              : `<div class="font-display text-2xl text-[#d4af37]">$${s.price}</div>`}
          </div>
          <div class="col-span-4 md:col-span-2 text-right">
            <a href="booking.html?service=${s.id}" class="btn btn-outline" style="padding:.6rem 1.2rem;font-size:.6rem" data-i18n="services.book"></a>
          </div>
        </div>`).join('');

      return `
        <article id="${cat}" class="reveal">
          <div class="grid lg:grid-cols-12 gap-10 mb-10 items-end">
            <div class="lg:col-span-4">
              <div class="card-image aspect-[4/5]">
                <img src="${CAT_IMG[cat]}" class="w-full h-full object-cover" alt="">
              </div>
            </div>
            <div class="lg:col-span-8">
              <div class="ornament mb-4 max-w-sm" style="justify-content:flex-start"><span>${window.I18nManager.t(CAT_LABELS[cat])}</span></div>
              <h2 class="font-display text-5xl md:text-6xl mb-3 text-cream">${window.I18nManager.t(CAT_LABELS[cat])}</h2>
            </div>
          </div>
          <div class="border-t border-[#d4af37]/15">${rows}</div>
        </article>`;
    }).join('');

  // re-translate the dynamic Book buttons
  if (window.I18nManager) window.I18nManager.apply();
}

document.addEventListener('DOMContentLoaded', () => {
  renderServices();

  document.querySelectorAll('.cat-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      activeCategory = tab.dataset.cat;
      document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active','btn-outline'));
      document.querySelectorAll('.cat-tab').forEach(t => t.classList.add('btn-ghost'));
      tab.classList.add('active');
      tab.classList.remove('btn-ghost');
      tab.classList.add('btn-outline');
      renderServices();
      window.scrollTo({ top: document.querySelector('#services-list').offsetTop - 160, behavior:'smooth' });
    });
  });
});
document.addEventListener('langchange', renderServices);

// Style active tab
const style = document.createElement('style');
style.textContent = `.cat-tab.active{background:#d4af37;color:#000;border-color:#d4af37;}`;
document.head.appendChild(style);
</script>
</body>
</html>
