<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>About · The Beauty Loft</title>
<meta name="description" content="Born from the belief that good service can't be rushed. Meet our senior team of stylists and licensed estheticians." />
<link rel="icon" type="image/png" href="assets/img/logo.png?v=2">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500;600;700&family=Italianno&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/main.css?v=13" />
</head>
<body>

<div class="page-loader"><div class="page-loader-inner"><img src="assets/img/logo.png?v=2" alt="The Beauty Loft" class="page-loader-logo-img"><div class="page-loader-bar"></div></div></div>
<div id="scroll-progress" style="position:fixed;top:0;left:0;height:2px;background:linear-gradient(90deg,#a88a2e,#d4af37,#f4e4ba);width:0;z-index:101"></div>

<div class="bg-[#0a0a0a] text-[#d4af37] py-2.5 px-6 text-center border-b border-[#d4af37]/15">
  <div class="text-xs tracking-[.32em] uppercase">
    <span data-i18n="top.bar"></span><span class="mx-4 opacity-50">·</span>
    <a href="booking.html" class="underline underline-offset-4 hover:text-[#f4e4ba]" data-i18n="top.cta"></a>
  </div>
</div>

<header id="navbar" class="sticky top-0 z-50 bg-[#050505]/95 backdrop-blur-md border-b border-[#d4af37]/10">
  <div class="max-w-7xl mx-auto flex items-center justify-between px-6 py-5">
    <a href="index.html" class="flex items-center">
      <img src="assets/img/logo.png?v=2" alt="The Beauty Loft" class="brand-logo">
    </a>
    <nav class="hidden lg:flex items-center gap-8">
      <a href="index.html" class="nav-link" data-i18n="nav.home"></a>
      <a href="services.html" class="nav-link" data-i18n="nav.services"></a>
      <a href="gallery.html" class="nav-link" data-i18n="nav.gallery"></a>
      <a href="about.html" class="nav-link active" data-i18n="nav.about"></a>
      <a href="contact.html" class="nav-link" data-i18n="nav.contact"></a>
    </nav>
    <div class="flex items-center gap-3">
      <a href="https://www.instagram.com/beautyloftny" target="_blank" rel="noopener" aria-label="Instagram @beautyloftny" class="w-10 h-10 flex items-center justify-center border border-[#d4af37]/30 text-[#d4af37] hover:bg-[#d4af37] hover:text-black transition">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r=".5" fill="currentColor"/></svg>
      </a>
      <button class="lang-toggle" data-lang-toggle><span data-lang="en">EN</span><span class="opacity-30">/</span><span data-lang="es">ES</span></button>
      <a href="booking.html" class="btn btn-gold gold-shine hide-mobile" data-i18n="nav.bookNow"></a>
      <button id="mobile-menu-trigger" class="show-mobile w-10 h-10 flex flex-col items-center justify-center gap-1 border border-[#d4af37]/30">
        <span class="w-4 h-px bg-[#d4af37]"></span><span class="w-4 h-px bg-[#d4af37]"></span><span class="w-4 h-px bg-[#d4af37]"></span>
      </button>
    </div>
  </div>
</header>

<div id="mobile-menu" class="mobile-menu">
  <button id="mobile-menu-close" class="absolute top-6 right-6 w-12 h-12 border border-[#d4af37]/40 text-[#d4af37] text-2xl flex items-center justify-center">×</button>
  <nav>
    <a href="index.html" data-i18n="nav.home"></a>
    <a href="services.html" data-i18n="nav.services"></a>
    <a href="gallery.html" data-i18n="nav.gallery"></a>
    <a href="about.html" data-i18n="nav.about"></a>
    <a href="contact.html" data-i18n="nav.contact"></a>
    <a href="booking.html" class="text-[#d4af37]" data-i18n="nav.bookNow"></a>
  </nav>
</div>

<!-- Hero -->
<section class="relative py-20 md:py-32 px-6 overflow-hidden border-b border-[#d4af37]/10">
  <div class="hero-bg"><img src="https://images.unsplash.com/photo-1487412947147-5cebf100ffc2?w=2000&auto=format&fit=crop" alt=""></div>
  <div class="absolute inset-0 bg-gradient-to-b from-[#050505]/60 via-[#050505]/80 to-[#050505]"></div>
  <div class="relative max-w-5xl mx-auto text-center reveal">
    <div class="ornament mb-6 max-w-sm mx-auto"><span data-i18n="aboutPage.hero.eyebrow"></span></div>
    <h1 class="font-display text-6xl md:text-9xl mb-6 gold-text-gradient italic" data-i18n="aboutPage.hero.title"></h1>
    <p class="text-[#d4d4d4] max-w-xl mx-auto text-lg" data-i18n="aboutPage.hero.subtitle"></p>
  </div>
</section>

<!-- Story -->
<section class="py-24 md:py-32 px-6">
  <div class="max-w-7xl mx-auto grid lg:grid-cols-12 gap-12 items-center">
    <div class="lg:col-span-5 reveal reveal-left relative">
      <div class="card-image aspect-[4/5]">
        <img src="assets/img/real-highlights.jpg" class="w-full h-full object-cover" alt="The Beauty Loft - Hair color work">
      </div>
      <div class="absolute -bottom-6 -left-6 bg-[#0a0a0a] border border-[#d4af37] py-4 px-6 hidden md:block">
        <div class="font-script text-3xl text-[#d4af37]">10+ Years Licensed</div>
        <div class="text-[10px] tracking-[.4em] uppercase text-[#7a7a7a]">Kips Bay · NYC</div>
      </div>
    </div>
    <div class="lg:col-span-7 reveal reveal-right">
      <div class="ornament mb-6 max-w-sm" style="justify-content:flex-start"><span data-i18n="about.eyebrow"></span></div>
      <h2 class="font-display text-5xl md:text-6xl mb-8 text-cream leading-tight" data-i18n="aboutPage.story.title"></h2>
      <p class="text-[#d4d4d4] mb-5 text-lg leading-relaxed" data-i18n="aboutPage.story.body1"></p>
      <p class="text-[#d4d4d4] mb-10 text-lg leading-relaxed" data-i18n="aboutPage.story.body2"></p>

      <div class="grid grid-cols-3 gap-6 pt-8 border-t border-[#d4af37]/15">
        <div>
          <div class="font-display text-4xl text-[#d4af37]" data-count="12">0</div>
          <div class="text-[10px] tracking-[.3em] uppercase text-[#7a7a7a] mt-2" data-i18n="about.fact1"></div>
        </div>
        <div>
          <div class="font-display text-4xl text-[#d4af37]"><span data-count="487">0</span>+</div>
          <div class="text-[10px] tracking-[.3em] uppercase text-[#7a7a7a] mt-2" data-i18n="about.fact2"></div>
        </div>
        <div>
          <div class="font-display text-4xl text-[#d4af37]" data-count="5">0</div>
          <div class="text-[10px] tracking-[.3em] uppercase text-[#7a7a7a] mt-2" data-i18n="about.fact3"></div>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- Team -->
<section class="py-24 md:py-32 px-6 bg-[#0a0a0a] border-y border-[#d4af37]/10">
  <div class="max-w-7xl mx-auto">
    <div class="text-center mb-16 reveal">
      <div class="ornament mb-6 max-w-sm mx-auto"><span data-i18n="aboutPage.team.eyebrow"></span></div>
      <h2 class="font-display text-5xl md:text-6xl text-cream" data-i18n="aboutPage.team.title"></h2>
    </div>

    <div id="team-grid" class="grid sm:grid-cols-2 lg:grid-cols-4 gap-6 reveal-stagger"></div>
  </div>
</section>

<!-- Values -->
<section class="py-24 md:py-32 px-6">
  <div class="max-w-7xl mx-auto">
    <div class="text-center mb-16 reveal">
      <div class="ornament mb-6 max-w-sm mx-auto"><span data-i18n="aboutPage.values.eyebrow"></span></div>
      <h2 class="font-display text-5xl md:text-6xl text-cream" data-i18n="aboutPage.values.title"></h2>
    </div>

    <div class="grid md:grid-cols-2 gap-6 max-w-5xl mx-auto reveal-stagger">
      <div class="card p-8">
        <div class="font-display text-5xl text-[#d4af37]/30 mb-3">01</div>
        <h3 class="font-display text-2xl mb-3 text-cream" data-i18n="aboutPage.value1.title"></h3>
        <p class="text-[#a3a3a3] text-sm" data-i18n="aboutPage.value1.body"></p>
      </div>
      <div class="card p-8">
        <div class="font-display text-5xl text-[#d4af37]/30 mb-3">02</div>
        <h3 class="font-display text-2xl mb-3 text-cream" data-i18n="aboutPage.value2.title"></h3>
        <p class="text-[#a3a3a3] text-sm" data-i18n="aboutPage.value2.body"></p>
      </div>
      <div class="card p-8">
        <div class="font-display text-5xl text-[#d4af37]/30 mb-3">03</div>
        <h3 class="font-display text-2xl mb-3 text-cream" data-i18n="aboutPage.value3.title"></h3>
        <p class="text-[#a3a3a3] text-sm" data-i18n="aboutPage.value3.body"></p>
      </div>
      <div class="card p-8">
        <div class="font-display text-5xl text-[#d4af37]/30 mb-3">04</div>
        <h3 class="font-display text-2xl mb-3 text-cream" data-i18n="aboutPage.value4.title"></h3>
        <p class="text-[#a3a3a3] text-sm" data-i18n="aboutPage.value4.body"></p>
      </div>
    </div>
  </div>
</section>

<!-- CTA -->
<section class="py-24 px-6 bg-[#0a0a0a] border-y border-[#d4af37]/10 text-center">
  <div class="max-w-2xl mx-auto reveal">
    <div class="font-script text-5xl text-[#d4af37] mb-3" data-i18n="cta.title"></div>
    <h3 class="font-display text-3xl md:text-4xl mb-8 text-cream" data-i18n="cta.subtitle"></h3>
    <a href="booking.html" class="btn btn-gold gold-shine" data-i18n="cta.book"></a>
  </div>
</section>

<footer class="bg-[#050505] border-t border-[#d4af37]/15 pt-16 pb-10 px-6">
  <div class="max-w-7xl mx-auto pt-6 flex flex-wrap justify-between text-xs tracking-[.3em] uppercase text-[#7a7a7a]">
    <span data-i18n="footer.copyright"></span><span data-i18n="footer.demo"></span>
  </div>
</footer>

<script src="assets/i18n.js?v=13"></script>
<script src="assets/data.js?v=13"></script>
<script src="assets/app.js?v=13"></script>
<script>
function renderTeam(){
  const lang = window.I18nManager?.current || 'en';
  document.getElementById('team-grid').innerHTML = STYLISTS.map(s => `
    <article class="card overflow-hidden">
      <div class="card-image aspect-[3/4]">
        <img src="${s.image}" class="w-full h-full object-cover" alt="${s.name}">
      </div>
      <div class="p-5">
        <h4 class="font-display text-2xl text-cream mb-1">${s.name}</h4>
        <p class="text-[10px] tracking-[.3em] uppercase text-[#d4af37] mb-3">${s.role[lang]} · ${s.years}+ yrs</p>
        <p class="text-xs text-[#a3a3a3] leading-relaxed mb-4">${s.bio[lang]}</p>
        <a href="booking.html" class="text-[10px] tracking-[.3em] uppercase text-[#d4af37] hover:text-[#f4e4ba]">→ Book with ${s.name.split(' ')[0]}</a>
      </div>
    </article>
  `).join('');
}
document.addEventListener('DOMContentLoaded', renderTeam);
document.addEventListener('langchange', renderTeam);
</script>
</body>
</html>
