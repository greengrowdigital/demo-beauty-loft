<script src="assets/i18n.js?v=2"></script>
<script src="assets/data.js?v=2"></script>
<script src="assets/app.js?v=2"></script>
<script>
// Render packages
const pkgGrid = document.getElementById('packages-grid');
function renderPackages() {
  if (!pkgGrid || !window.PACKAGES) return;
  const lang = window.I18nManager?.current || 'en';
  pkgGrid.innerHTML = window.PACKAGES.map(p => {
    const includes = p.includes.map(it => `<li class="flex items-start gap-2 text-sm"><span class="text-[#d4af37] mt-1">✓</span><span>${it[lang]}</span></li>`).join('');
    return `
      <article class="card overflow-hidden">
        <div class="card-image aspect-[4/5]">
          <img src="${p.image}" alt="" class="w-full h-full object-cover">
        </div>
        <div class="p-7">
          <h3 class="font-display text-2xl mb-2 text-cream">${window.I18nManager.t(p.titleKey)}</h3>
          <p class="text-[#a3a3a3] text-sm mb-5">${window.I18nManager.t(p.descKey)}</p>
          <ul class="space-y-1.5 mb-6 text-[#d4d4d4]">${includes}</ul>
          <div class="flex items-end justify-between border-t border-[#d4af37]/15 pt-5">
            <div>
              <div class="font-display text-3xl text-[#d4af37]">$${p.price}</div>
              <div class="text-[10px] tracking-[.3em] uppercase text-[#7a7a7a] mt-1">${p.duration} ${window.I18nManager.t('packages.duration')}</div>
            </div>
            <a href="booking.html?service=${p.id}" class="btn btn-outline" style="padding:.7rem 1.2rem;font-size:.65rem">${window.I18nManager.t('packages.book')}</a>
          </div>
        </div>
      </article>`;
  }).join('');
}

// Render reviews
const revGrid = document.getElementById('reviews-grid');
function renderReviews() {
  if (!revGrid || !window.REVIEWS) return;
  const lang = window.I18nManager?.current || 'en';
  revGrid.innerHTML = window.REVIEWS.slice(0,3).map(r => {
    const stars = '★'.repeat(r.rating);
    return `
      <article class="card p-7">
        <div class="flex items-center justify-between mb-4">
          <div class="text-[#d4af37] tracking-[.2em]">${stars}</div>
          <div class="text-[10px] tracking-[.3em] uppercase text-[#7a7a7a]">${r.when}</div>
        </div>
        <blockquote class="font-display text-xl text-cream italic leading-relaxed mb-5">"${r.text[lang]}"</blockquote>
        <div class="flex items-center justify-between pt-4 border-t border-[#d4af37]/15">
          <div>
            <div class="text-cream text-sm font-medium">${r.name}</div>
            <div class="text-[10px] tracking-[.3em] uppercase text-[#7a7a7a] mt-1">${r.service[lang]}</div>
          </div>
          <div class="w-10 h-10 rounded-full bg-[#d4af37]/15 border border-[#d4af37]/30 flex items-center justify-center text-[#d4af37] font-display">${r.name.charAt(0)}</div>
        </div>
      </article>`;
  }).join('');
}

document.addEventListener('DOMContentLoaded', () => {
  renderPackages();
  renderReviews();
});
document.addEventListener('langchange', () => {
  renderPackages();
  renderReviews();
});
</script>
